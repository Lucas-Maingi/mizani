version: 2

models:
  - name: dim_date
    description: Calendar dimension spanning every date referenced by a fact.
    columns:
      - name: date_key
        description: Surrogate key, yyyymmdd integer.
        data_tests: [unique, not_null]
      - name: calendar_date
        data_tests: [unique, not_null]

  - name: dim_country
    description: East African Community reference countries.
    columns:
      - name: country_iso3
        data_tests: [unique, not_null]

  - name: dim_currency
    description: Currencies quoted by CBK plus regional currencies.
    columns:
      - name: currency_code
        data_tests: [unique, not_null]

  - name: fact_exchange_rate
    description: >
      Daily KES exchange rates, one row per (date, currency), normalized to
      KES per 1 foreign unit regardless of the published quote convention.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date_key, currency_code]
    columns:
      - name: date_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: currency_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_currency')
                field: currency_code
      - name: kes_per_unit_mean
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false

  - name: fact_mobile_money
    description: CBK monthly mobile-money statistics for Kenya, one row per month.
    columns:
      - name: date_key
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: country_iso3
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_iso3

  - name: fact_worldbank_indicator
    description: World Bank annual indicator observations.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [indicator_code, country_iso3, year]
    columns:
      - name: country_iso3
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_iso3
      - name: value
        data_tests: [not_null]

  - name: fact_gsma_metric
    description: GSMA quarterly mobile-money metrics by region/subregion.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              [measure, geo_view, geo_name, attribute, unit, metric, date_key]
    columns:
      - name: date_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: value
        data_tests: [not_null]
